[project]
name = "proof-library"
authors = ["ProofLabs Team"]
description = "A decentralized proof verification and management library"
telemetry = false
requirements = []
[contracts.proof-verification]
path = "contracts/proof-verification.clar"
depends_on = []

[contracts.proof-registry]
path = "contracts/proof-registry.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
